<template>
    <div style="height: 300px;">
        <lightning-datatable
            key-field="id"
            data={data}
            columns={columns}>
        </lightning-datatable>
    </div>
    <lightning-input label=" Name" placeholder="Name" onchange={handlerchange}>
    </lightning-input>
    <lightning-input label="Password" value={password} placeholder="Password"
        onchange={handlerpass}></lightning-input>

    <div>
        <h1> <b>Resoure details</b></h1>
        <p>Name : {name}</p>
        <p> Soures pakage : {source}</p>
    </div>

</template>
